<ui:composition template="/WEB-INF/layouts/anonymous.xhtml"
        xmlns:ui="http://java.sun.com/jsf/facelets"
        xmlns:f="http://java.sun.com/jsf/core"
        xmlns:w="http://code.google.com/p/ada-asf/widget"
        xmlns:c="http://java.sun.com/jstl/core"
	    xmlns:u="http://code.google.com/p/ada-asf/util"
        xmlns:h="http://java.sun.com/jsf/html">
    <ui:param name="title" value="#{blogMsg.blog_page_title}"/>
    <ui:param name="pageStyle" value="page-blog"/>

    <ui:define name="pageHeader">
        <ui:include src="/WEB-INF/meta-page.xhtml">
           <ui:param name="pageUrl" value="#{initParam['app_url_base']}/index.html"/>
           <ui:param name="pageDescription" value="Explore the technology stack powering Twinlife's applications, including twinme, twinme+, and Skred. Discover the tools and frameworks behind our innovative solutions."/>
        </ui:include>
    </ui:define>

    <!-- Main page body -->
    <ui:define name="pageBody">
        <f:metadata>
            <f:viewParam id='page' value='#{postList.page}' required="false"/>
            <f:viewAction action="#{postList.load}"/>
        </f:metadata>
      <div id='awa-content' class='awa-columns'>
          <div class='awa-grid-9'>
              <ui:include src="blogs/lists/post-list.xhtml">
                  <ui:param name="pageUrl" value="blogs/view.html"/>
              </ui:include>
          </div>
          <div class='awa-grid-3 blog-post-info'>
            <ui:include src="blogs/lists/post-info.xhtml"/>
          </div>
      </div>
    </ui:define>

    <ui:define name="pageScript">
      <script src="#{contextPath}/js/highlight.pack.js"></script>
      <script>hljs.initHighlightingOnLoad();</script>
    </ui:define>

</ui:composition>
